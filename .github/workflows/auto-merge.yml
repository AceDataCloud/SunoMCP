name: Auto-merge Copilot PRs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-merge:
    # Only run when CI passed for a pull_request event
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find associated PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "CI passed on branch: $HEAD_BRANCH"

          # Find open PR for this branch
          PR_JSON=$(gh pr list --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" --state open --json number,title,author \
            --jq '.[0] // empty')

          if [ -z "$PR_JSON" ]; then
            echo "No open PR found for branch $HEAD_BRANCH"
            echo "should_merge=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          echo "PR #$PR_NUMBER by $PR_AUTHOR: $PR_TITLE"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Check if it's a Copilot PR or has [auto-sync] tag
          if [[ "$PR_AUTHOR" == "app/copilot-swe-agent" || "$PR_AUTHOR" == "Copilot" || "$PR_TITLE" == *"[auto-sync]"* ]]; then
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "Not a Copilot auto-sync PR, skipping"
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR
        if: steps.find-pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"
          echo "Merging PR #$pr_number..."
          gh pr merge "$pr_number" --repo "${{ github.repository }}" --squash \
            --subject "sync: update from Docs [automated]"
          echo "PR #$pr_number merged successfully!"
