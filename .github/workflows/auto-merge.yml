name: Auto-merge Copilot PRs

on:
  workflow_run:
    workflows: ["CI", "Copilot coding agent"]
    types: [completed]

jobs:
  auto-merge:
    # Only run for pull_request-related CI or Copilot agent completions
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'pull_request' ||
       github.event.workflow_run.name == 'Copilot coding agent')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Find associated PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          TRIGGER="${{ github.event.workflow_run.name }}"
          echo "Triggered by: $TRIGGER on branch: $HEAD_BRANCH"

          # Find open PR for this branch
          PR_JSON=$(gh pr list --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" --state open --json number,title,author,isDraft \
            --jq '.[0] // empty')

          if [ -z "$PR_JSON" ]; then
            echo "No open PR found for branch $HEAD_BRANCH"
            echo "should_merge=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          echo "PR #$PR_NUMBER by $PR_AUTHOR: $PR_TITLE"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Check if it's a Copilot PR or has [auto-sync] tag
          if [[ "$PR_AUTHOR" == "app/copilot-swe-agent" || "$PR_AUTHOR" == "Copilot" || "$PR_TITLE" == *"[auto-sync]"* ]]; then
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "Not a Copilot auto-sync PR, skipping"
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for CI if triggered by Copilot agent
        if: >-
          steps.find-pr.outputs.should_merge == 'true' &&
          github.event.workflow_run.name == 'Copilot coding agent'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"
          echo "Triggered by Copilot agent completion, waiting for CI..."
          for i in $(seq 1 20); do
            sleep 30
            ci_status=$(gh pr checks "$pr_number" --repo "${{ github.repository }}" \
              --json name,state \
              --jq '[.[] | select(.name != "auto-merge" and .name != "Auto-merge Copilot PRs")] |
                if length == 0 then "pending"
                elif all(.state == "SUCCESS" or .state == "SKIPPED") then "pass"
                elif any(.state == "FAILURE") then "fail"
                else "pending" end' 2>/dev/null || echo "pending")
            echo "Attempt $i/20: CI status = $ci_status"
            if [ "$ci_status" = "pass" ]; then
              echo "CI passed!"
              exit 0
            elif [ "$ci_status" = "fail" ]; then
              echo "::error::CI failed, aborting merge"
              exit 1
            fi
          done
          echo "::error::CI did not complete in time"
          exit 1

      - name: Mark ready and merge PR
        if: steps.find-pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"

          # Copilot creates draft PRs — mark as ready first
          is_draft=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          if [ "$is_draft" = "true" ]; then
            echo "PR #$pr_number is draft, marking as ready..."
            gh pr ready "$pr_number" --repo "${{ github.repository }}"
          fi

          echo "Merging PR #$pr_number..."
          gh pr merge "$pr_number" --repo "${{ github.repository }}" --squash \
            --subject "sync: update from Docs [automated]"
          echo "PR #$pr_number merged successfully!"
