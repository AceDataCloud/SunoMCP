name: Sync from Docs

on:
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout Docs
        uses: actions/checkout@v4
        with:
          repository: AceDataCloud/Docs
          path: _docs
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 5

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_KEY }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          prompt: |
            The upstream AceDataCloud Docs have been updated. They are checked out at `_docs/`.
            Your job: ensure this MCP server stays in sync with the latest Docs.

            Source of truth: `_docs/openapi/suno.json` (the Suno API OpenAPI spec).

            Check recent Docs changes (`cd _docs && git log --oneline -5`), then compare
            the current spec against this repo's code. Fix any differences in model types,
            tool definitions, parameters, or documentation.

            Read this repo's CLAUDE.md for detailed sync rules.

            If everything is already in sync, make no changes.
        env:
          ANTHROPIC_BASE_URL: ${{ vars.CLAUDE_CODE_API_BASE || 'https://api.acedata.cloud' }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.CLAUDE_CODE_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-20250514

      - name: Merge PR
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          branch="${{ steps.claude.outputs.branch_name }}"

          # Find the PR created by Claude for this branch
          pr_number=$(gh pr list --head "$branch" --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "No PR found for branch $branch"
            exit 0
          fi

          echo "Found PR #$pr_number (branch: $branch). Waiting for CI..."

          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            sleep 30
            status=$(gh pr checks "$pr_number" --json name,state \
              --jq '[.[] | select(.name != "Sync from Docs")] |
                if length == 0 then "pass"
                elif all(.state == "SUCCESS" or .state == "SKIPPED") then "pass"
                elif any(.state == "FAILURE") then "fail"
                else "pending" end' 2>/dev/null || echo "pending")
            echo "Attempt $i/$max_attempts: $status"
            if [ "$status" = "pass" ]; then
              echo "CI passed!"
              break
            elif [ "$status" = "fail" ]; then
              echo "CI failed. Skipping merge."
              exit 1
            fi
          done

          echo "Approving and merging PR #$pr_number..."
          gh pr review "$pr_number" --approve
          gh pr merge "$pr_number" --squash \
            --subject "sync: update from Docs [automated]"
