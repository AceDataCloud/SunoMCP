name: Sync from Docs

on:
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-task:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Docs
        uses: actions/checkout@v4
        with:
          repository: AceDataCloud/Docs
          path: _docs
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 5

      - name: Get Docs changes
        id: docs
        run: |
          cd _docs
          commit_info=$(git log -1 --pretty=format:"%h %s" 2>/dev/null || echo "unknown")
          echo "commit_info=$commit_info" >> "$GITHUB_OUTPUT"

          recent_changes=$(git log --oneline -5 2>/dev/null || echo "unknown")
          echo "recent_changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$recent_changes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Close existing sync issues
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Close any existing open auto-sync issues to avoid duplicates
          gh issue list --repo "${{ github.repository }}" --label "auto-sync" --state open --json number --jq '.[].number' | while read -r num; do
            gh issue close "$num" --repo "${{ github.repository }}" --comment "Superseded by new sync trigger." 2>/dev/null || true
          done

      - name: Create issue for Copilot
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          COMMIT_INFO: ${{ steps.docs.outputs.commit_info }}
          RECENT_CHANGES: ${{ steps.docs.outputs.recent_changes }}
          REPO: ${{ github.repository }}
        run: |
          body=$(jq -n \
            --arg changes "$RECENT_CHANGES" \
            '"The upstream Docs have been updated. Ensure this MCP server is in sync with the latest API spec.\n\n## Recent Docs Changes\n\n```\n" + $changes + "\n```\n\n## Instructions\n\nSee `.github/copilot-instructions.md` and `CLAUDE.md` for sync rules.\n\nSource of truth: the Docs repo OpenAPI spec at `openapi/suno.json`.\n\nCompare models, endpoints, and parameters against this repo'\''s code. Fix any differences."')

          jq -n \
            --arg title "sync: update from Docs ($COMMIT_INFO)" \
            --argjson body "$body" \
            --arg repo "$REPO" \
            '{
              title: $title,
              body: $body,
              labels: ["auto-sync"],
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: "Check out the AceDataCloud/Docs repo and read openapi/suno.json. Compare the model enum and endpoints against core/types.py and tools/. Fix any differences. Read CLAUDE.md for detailed sync rules. If everything is already in sync, close this issue with a comment saying so."
              }
            }' | gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/"$REPO"/issues \
            --input -
